    [event]
        name=turn 4
        [message]
            speaker=Serath
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=cave-in.ogg
        [/sound]
        [unit]
            type=Draug
            side=2
            x=45
            y=16
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Draug
            side=2
            x=46
            y=16
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]



    [event]
        name=moveto
        first_time_only=no
        [filter]
            id=Hunter
            x=2
            y=19
        [/filter]
        [if]
            [variable]
                name=wpb_final_escape
                equals=yes
            [/variable]
            [then]
                [if]
                    [variable]
                        name=wpb_sacrificed
                        greater_than=7
                    [/variable]
                    [then]
                        [message]
                            speaker=narrator
                            message= _ "Wesnoth is saved by a man its people would fear if they knew what he had done. The silence beneath Esten follows him home."
                        [/message]
                    [/then]
                    [else]
                        [message]
                            speaker=narrator
                            message= _ "The dead collapse, the rivers begin to clear, and witnesses carry the truth back to Wesnoth. For the first time, the silence beneath Esten belongs only to the earth."
                        [/message]
                    [/else]
                [/if]
                [endlevel]
                    result=victory
                    carryover_report=no
                    linger_mode=no
                [/endlevel]
            [/then]
            [else]
                [message]
                    speaker=Hunter
                    message= _ "Not yet. The command nexus is still active."
                [/message]
            [/else]
        [/if]
    [/event]

    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
