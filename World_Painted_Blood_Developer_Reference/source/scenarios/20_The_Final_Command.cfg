#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=20_The_Final_Command
    name=_ "The Final Command"
    next_scenario=null
    victory_when_enemies_defeated=no
    map_file=20_The_Final_Command.map
    {TURNS 44 40 36}
    {UNDERGROUND}
    {SCENARIO_MUSIC 20_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The Final Command passes through the caverns like a heartbeat and every corpse beneath Esten begins marching toward the surface. The underground kingdom collapses even as its command nexus continues issuing orders."
        [/part]
        [part]
            story=_ "The Hunter must sever the command arteries, kill the surviving cabal, destroy the nexus, and escape through the original sinkhole. Allies, hostile memories, equipment, and the final ending all reflect the campaign's accumulated rescue, sacrifice, truth, alliance, and corruption variables."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=19
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Outlaw,Swordsman,Longbowman,White Mage,Dwarvish Fighter
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Great Mage
        id=Serath
        name=_ "High Magister Serath"
        canrecruit=yes
        x=48
        y=19
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 180 220 260}
        income=5
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Necromancer
        id=Velis
        name=_ "Commandant Velis"
        canrecruit=yes
        x=48
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 160 205 250}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=5
        controller=ai
        type=Lich
        id=Kharos_Final
        name=_ "Kharos the Red-Crowned"
        canrecruit=yes
        x=48
        y=33
        team_name=undead
        user_team_name= _ "Final Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 180 220 260}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s20_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s20_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=17
            y=9
            text=_ "Command Pylon 1"
        [/label]
        [label]
            x=34
            y=9
            text=_ "Command Pylon 2"
        [/label]
        [label]
            x=17
            y=28
            text=_ "Command Pylon 3"
        [/label]
        [label]
            x=34
            y=28
            text=_ "Command Pylon 4"
        [/label]
        [label]
            x=8
            y=19
            text=_ "The Last Survivor"
        [/label]
        [unit]
            type=Bowman
            id=Last_Survivor
            name=_ "The Last Survivor"
            side=4
            x=8
            y=19
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 command pylon locations and defeat 3 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=20
            green=-55
            blue=-60
        [/color_adjust]
        [message]
            speaker=Serath
            message=_ "You killed the master and gave us the only command we could never persuade it to issue."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then you should have chosen a better final order."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=19
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Last_Survivor
            message=_ "The pylons keep the dead moving. Break them and the nexus can be reached."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Last_Survivor
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Last_Survivor
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Give me the last charge. I will take it into the eastern artery."
                    [/message]
                    [message]
                        speaker=Last_Survivor
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Serath
                        [/filter]
                        amount=17
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=38
                    [/gold]
                    [kill]
                        id=Last_Survivor
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=17
        y=9
    [/filter]
    [sound]
        name=cave-in.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Command pylon 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s20_sites
        add=1
    [/set_variable]
    [terrain]
        x=17
        y=9
        terrain=Urb
    [/terrain]
    [label]
        x=17
        y=9
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s20_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s20_bosses
                numerical_equals=3
            [/variable]
        [/and]
        [and]
            [variable]
                name=wpb_final_escape
                not_equals=yes
            [/variable]
        [/and]
        [then]
            [set_variable]
                name=wpb_final_escape
                value=yes
            [/set_variable]
            [sound]
                name=cave-in.ogg
            [/sound]
            [message]
                speaker=Hunter
                message= _ "The nexus is failing. The dead are collapsing—but so is everything above us. Back to the sinkhole!"
            [/message]
            [objectives]
                side=1
                [objective]
                    description= _ "Move the Hunter to the western sinkhole"
                    condition=win
                [/objective]
                [objective]
                    description= _ "Death of the Hunter"
                    condition=lose
                [/objective]
                [objective]
                    description= _ "Turns run out"
                    condition=lose
                [/objective]
                {WPB_RECRUIT_NOTE}
            [/objectives]
        [/then]
    [/if]
[/event]

