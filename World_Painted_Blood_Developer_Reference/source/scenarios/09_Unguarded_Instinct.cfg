#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=09_Unguarded_Instinct
    name=_ "Unguarded Instinct"
    next_scenario=10_Born_of_Fire
    victory_when_enemies_defeated=no
    map_file=09_Unguarded_Instinct.map
    {TURNS 30 27 24}
    {UNDERGROUND}
    {SCENARIO_MUSIC 09_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "Blood magic from the reservoir sharpens the Hunter's senses while feeding impulses that do not feel like his own. The only possible cure is hidden inside an asylum whose wards were designed to divide body, soul, and conscience."
        [/part]
        [part]
            story=_ "The Hunter must recover the ward sigils and enter the treatment circle while Doctor Vael releases the asylum's surviving experiments. The player may accept controlled corruption for power or pursue a slower cleansing."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Poacher,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 126 102 78}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Necromancer
        id=Vael
        name=_ "Doctor Vael"
        canrecruit=yes
        x=34
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 125 154 183}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s09_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s09_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=7
            text=_ "Ward Sigil 1"
        [/label]
        [label]
            x=19
            y=9
            text=_ "Ward Sigil 2"
        [/label]
        [label]
            x=25
            y=21
            text=_ "Ward Sigil 3"
        [/label]
        [label]
            x=8
            y=14
            text=_ "Sister Tirin"
        [/label]
        [unit]
            type=White Mage
            id=Sister_Tirin
            name=_ "Sister Tirin"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 ward sigil locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-35
            green=-15
            blue=-10
        [/color_adjust]
        [message]
            speaker=Vael
            message=_ "Instinct is honesty without shame."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then honestly, I intend to kill you."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Sister_Tirin
            message=_ "Gather the sigils. Without them the treatment circle will tear you apart."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Sister_Tirin
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Sister_Tirin
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Stand in the outer ward and draw the patients away from the treatment chamber."
                    [/message]
                    [message]
                        speaker=Sister_Tirin
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Vael
                        [/filter]
                        amount=11
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=27
                    [/gold]
                    [kill]
                        id=Sister_Tirin
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=7
    [/filter]
    [sound]
        name=hiss-big.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Ward sigil 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s09_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=7
        text=""
    [/label]
    [if]
        [variable]
            name=wpb_corruption
            greater_than=0
        [/variable]
        [then]
            [set_variable]
                name=wpb_corruption
                sub=1
            [/set_variable]
        [/then]
    [/if]
    [if]
        [variable]
            name=wpb_s09_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s09_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

