[event]
    name=die
    [filter]
        id=Vael
    [/filter]
    [set_variable]
        name=wpb_s09_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
            name=wpb_s09_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s09_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

    [event]
        name=turn 5
        [message]
            speaker=Vael
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=hiss-big.wav
        [/sound]
        [unit]
            type=Ghast
            side=2
            x=31
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Ghast
            side=2
            x=32
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]

    [event]
        name=prestart
        [set_menu_item]
            id=wpb_unguarded_instinct
            description= _ "Unguarded Instinct: heal the Hunter for 12 HP at the cost of 1 corruption"
            [show_if]
                [have_unit]
                    id=Hunter
                    x,y=$x1,$y1
                [/have_unit]
            [/show_if]
            [command]
                [heal_unit]
                    [filter]
                        id=Hunter
                    [/filter]
                    amount=12
                    animate=yes
                [/heal_unit]
                [set_variable]
                    name=wpb_corruption
                    add=1
                [/set_variable]
                [clear_menu_item]
                    id=wpb_unguarded_instinct
                [/clear_menu_item]
            [/command]
        [/set_menu_item]
    [/event]



    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
