    [/filter]
    [sound]
        name=hiss-big.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Ward sigil 3 is secured."
    [/message]
    [set_variable]
        name=wpb_s09_sites
        add=1
    [/set_variable]
    [terrain]
        x=25
        y=21
        terrain=Urb
    [/terrain]
    [label]
        x=25
        y=21
        text=""
    [/label]
    [if]
        [variable]
            name=wpb_corruption
            greater_than=0
        [/variable]
        [then]
            [set_variable]
                name=wpb_corruption
                sub=1
            [/set_variable]
        [/then]
    [/if]
    [if]
        [variable]
            name=wpb_s09_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s09_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
