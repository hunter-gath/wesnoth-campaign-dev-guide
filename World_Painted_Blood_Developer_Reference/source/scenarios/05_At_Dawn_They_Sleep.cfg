#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=05_At_Dawn_They_Sleep
    name=_ "At Dawn They Sleep"
    next_scenario=06_Die_by_the_Sword
    victory_when_enemies_defeated=no
    map_file=05_At_Dawn_They_Sleep.map
    {TURNS 31 28 25}
    {UNDERGROUND}
    {SCENARIO_MUSIC 05_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "A false dawn shines through crystals above a crypt packed with sleeping bats and blood-drinking undead. The light does not destroy them; it merely holds them inside their dreams."
        [/part]
        [part]
            story=_ "Before the crystals dim, the Hunter must destroy the blood cisterns and kill Seryn and Vaska. Captives chained beside the controls can maintain the light—or be abandoned to occupy the brood."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Poacher,Footpad,Spearman,Bowman,Mage
        {GOLD 110 90 70}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Necromancer
        id=Seryn
        name=_ "Seryn of the Hollow Vein"
        canrecruit=yes
        x=34
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 105 130 155}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Dread Bat
        id=Vaska
        name=_ "Vaska, Brood-Mother"
        canrecruit=yes
        x=34
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 85 115 145}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s05_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s05_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=8
            text=_ "Blood Cistern 1"
        [/label]
        [label]
            x=25
            y=8
            text=_ "Blood Cistern 2"
        [/label]
        [label]
            x=12
            y=24
            text=_ "Blood Cistern 3"
        [/label]
        [label]
            x=25
            y=24
            text=_ "Blood Cistern 4"
        [/label]
        [label]
            x=8
            y=16
            text=_ "Lethan Crow"
        [/label]
        [unit]
            type=White Mage
            id=Lethan_Crow
            name=_ "Lethan Crow"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 blood cistern locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=0
            green=-50
            blue=-25
        [/color_adjust]
        [message]
            speaker=Seryn
            message=_ "You mistake sleep for weakness."
        [/message]
        [message]
            speaker=Hunter
            message=_ "And you mistake hunger for strength."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Lethan_Crow
            message=_ "Break the cisterns before the false dawn fades."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Lethan_Crow
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Lethan_Crow
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Remain at the crystal and keep the nearest coffins sleeping."
                    [/message]
                    [message]
                        speaker=Lethan_Crow
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Seryn
                        [/filter]
                        amount=9
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=23
                    [/gold]
                    [kill]
                        id=Lethan_Crow
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=8
    [/filter]
    [sound]
        name=bat-flapping.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Blood cistern 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s05_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=8
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s05_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s05_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

