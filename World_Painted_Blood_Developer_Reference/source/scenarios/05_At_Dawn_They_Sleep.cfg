    [event]
        name=turn 5
        [message]
            speaker=Seryn
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=bat-flapping.wav
        [/sound]
        [unit]
            type=Blood Bat
            side=2
            x=31
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Blood Bat
            side=2
