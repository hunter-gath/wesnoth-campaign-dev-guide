    [event]
        name=turn 6
        [message]
            speaker=Azkar
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=explosion.ogg
        [/sound]
        [unit]
            type=Deathblade
            side=2
            x=33
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Deathblade
            side=2
            x=34
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
