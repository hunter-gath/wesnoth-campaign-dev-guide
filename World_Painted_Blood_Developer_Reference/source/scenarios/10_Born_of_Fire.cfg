#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=10_Born_of_Fire
    name=_ "Born of Fire"
    next_scenario=11_Fictional_Reality
    victory_when_enemies_defeated=no
    map_file=10_Born_of_Fire.map
    {TURNS 34 31 28}
    {UNDERGROUND}
    {SCENARIO_MUSIC 10_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "Beyond the asylum lies a forge where corpses are burned clean of memory and rebuilt as weapons. Every furnace is fed by bound spirits and every completed blade contains someone who once resisted."
        [/part]
        [part]
            story=_ "The Hunter must disable the furnaces, destroy the forge heart, and kill Azkar and Vharr. Cooling the machinery frees its captives; overloading it is faster and far less merciful."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Great Mage
        id=Azkar
        name=_ "Azkar Born-in-Flame"
        canrecruit=yes
        x=36
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 130 160 190}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Necromancer
        id=Vharr
        name=_ "Vharr the Bone-Smith"
        canrecruit=yes
        x=36
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 110 145 180}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s10_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s10_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=13
            y=7
            text=_ "Furnace Control 1"
        [/label]
        [label]
            x=20
            y=10
            text=_ "Furnace Control 2"
        [/label]
        [label]
            x=26
            y=22
            text=_ "Furnace Control 3"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Oren Flint"
        [/label]
        [unit]
            type=Dwarvish Fighter
            id=Oren_Flint
            name=_ "Oren Flint"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 furnace control locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=20
            green=-30
            blue=-70
        [/color_adjust]
        [message]
            speaker=Azkar
            message=_ "Everything weak burns away."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then stand closer to your furnace."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Oren_Flint
            message=_ "The controls can cool the furnaces—or overload them."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Oren_Flint
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Oren_Flint
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Seal yourself inside the nearest furnace chamber and hold the vent shut."
                    [/message]
                    [message]
                        speaker=Oren_Flint
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Azkar
                        [/filter]
                        amount=12
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=28
                    [/gold]
                    [kill]
                        id=Oren_Flint
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=13
        y=7
    [/filter]
    [sound]
        name=explosion.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Furnace control 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s10_sites
        add=1
    [/set_variable]
    [terrain]
        x=13
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=13
        y=7
        text=""
    [/label]
    [sound]
        name=explosion.ogg
    [/sound]
    [harm_unit]
        [filter]
            side=2,3
            [filter_location]
                x=13
                y=7
                radius=1
            [/filter_location]
        [/filter]
        amount=8
        damage_type=fire
        animate=yes
    [/harm_unit]
    [if]
        [variable]
            name=wpb_s10_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s10_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

