#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=06_Die_by_the_Sword
    name=_ "Die by the Sword"
    next_scenario=07_You_Against_You
    victory_when_enemies_defeated=no
    map_file=06_Die_by_the_Sword.map
    {TURNS 34 31 28}
    {UNDERGROUND}
    {SCENARIO_MUSIC 06_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The blood shipments lead to a mining settlement where living laborers work until death and continue their shifts after being raised. Sir Malrec claims the sword is the only law the helpless understand."
        [/part]
        [part]
            story=_ "The Hunter must capture the rail junctions, destroy the corpse-processing line, and take Malrec's ledger. The miners can be evacuated, armed, or ordered to hold lethal side tunnels."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Poacher,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 114 93 72}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Death Knight
        id=Malrec
        name=_ "Sir Malrec the Red Blade"
        canrecruit=yes
        x=36
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 110 136 162}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s06_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s06_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=13
            y=7
            text=_ "Rail Junction 1"
        [/label]
        [label]
            x=20
            y=9
            text=_ "Rail Junction 2"
        [/label]
        [label]
            x=26
            y=21
            text=_ "Rail Junction 3"
        [/label]
        [label]
            x=8
            y=14
            text=_ "Aldren Vale"
        [/label]
        [unit]
            type=Swordsman
            id=Aldren_Vale
            name=_ "Aldren Vale"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 rail junction locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=10
            green=-35
            blue=-55
        [/color_adjust]
        [message]
            speaker=Malrec
            message=_ "The sword decided who commands this place."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then let it reconsider."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Aldren_Vale
            message=_ "Take the rail switches and the dead cannot reinforce him quickly."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Aldren_Vale
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Aldren_Vale
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Hold the eastern shaft. Keep the work gang away from the switches."
                    [/message]
                    [message]
                        speaker=Aldren_Vale
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Malrec
                        [/filter]
                        amount=10
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=24
                    [/gold]
                    [kill]
                        id=Aldren_Vale
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=13
        y=7
    [/filter]
    [sound]
        name=axe.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Rail junction 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s06_sites
        add=1
    [/set_variable]
    [terrain]
        x=13
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=13
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s06_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s06_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

