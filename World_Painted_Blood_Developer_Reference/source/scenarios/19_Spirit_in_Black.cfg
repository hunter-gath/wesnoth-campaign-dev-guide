#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=19_Spirit_in_Black
    name=_ "Spirit in Black"
    next_scenario=20_The_Final_Command
    victory_when_enemies_defeated=no
    map_file=19_Spirit_in_Black.map
    {TURNS 38 35 32}
    {UNDERGROUND}
    {SCENARIO_MUSIC 19_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "At the deepest point beneath Esten stands the throne of Nhal-Zor, the ancient will that shaped the cabal through generations of dreams. Four rivers of imprisoned souls feed its immortality."
        [/part]
        [part]
            story=_ "The Hunter must break the soul chains and destroy Nhal-Zor's forms. Souls may be released, shattered, or consumed, and those deliberately sacrificed earlier return as guards around the throne."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Outlaw,Swordsman,Longbowman,White Mage,Dwarvish Fighter
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Ancient Lich
        id=Nhal_Zor
        name=_ "Nhal-Zor, the Spirit in Black"
        canrecruit=yes
        x=38
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 175 214 253}
        income=5
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Lich
        id=Chain_Keeper
        name=_ "The First Chain Keeper"
        canrecruit=yes
        x=38
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 155 199 243}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s19_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s19_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=14
            y=7
            text=_ "Soul Chain 1"
        [/label]
        [label]
            x=28
            y=7
            text=_ "Soul Chain 2"
        [/label]
        [label]
            x=14
            y=22
            text=_ "Soul Chain 3"
        [/label]
        [label]
            x=28
            y=22
            text=_ "Soul Chain 4"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Oris the Unclaimed"
        [/label]
        [unit]
            type=Ghost
            id=Oris
            name=_ "Oris the Unclaimed"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 soul chain locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=5
            green=-55
            blue=-25
        [/color_adjust]
        [message]
            speaker=Nhal_Zor
            message=_ "You crossed every grave between us. Do not pretend you came to close the door."
        [/message]
        [message]
            speaker=Hunter
            message=_ "I came to bury what is beneath it."
        [/message]
        [gold]
            side=2
            amount=$($wpb_sacrificed * 6)
        [/gold]
        [message]
            speaker=Nhal_Zor
            message= _ "Every life you knowingly spent has reached me. I have made use of them."
        [/message]
    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Oris
            message=_ "Break the chains and the throne will have to feed upon itself."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Oris
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Oris
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Bind me to the nearest chain. It will drink me before it notices you."
                    [/message]
                    [message]
                        speaker=Oris
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Nhal_Zor
                        [/filter]
                        amount=16
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=37
                    [/gold]
                    [kill]
                        id=Oris
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=14
        y=7
    [/filter]
    [sound]
        name=claws.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Soul chain 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s19_sites
        add=1
    [/set_variable]
    [terrain]
        x=14
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=14
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s19_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s19_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

