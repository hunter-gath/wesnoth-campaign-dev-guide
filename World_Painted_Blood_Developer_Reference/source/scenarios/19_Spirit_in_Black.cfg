    [event]
        name=turn 7
        [message]
            speaker=Nhal_Zor
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=claws.ogg
        [/sound]
        [unit]
            type=Spectre
            side=2
            x=35
            y=12
