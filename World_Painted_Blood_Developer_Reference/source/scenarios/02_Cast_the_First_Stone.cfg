    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=26
        y=24
    [/filter]
    [sound]
        name=groan.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Ritual stone 3 is secured."
    [/message]
    [set_variable]
        name=wpb_s02_sites
        add=1
    [/set_variable]
    [terrain]
        x=26
        y=24
        terrain=Urb
    [/terrain]
    [label]
        x=26
