    [/label]

    [if]
        [variable]
            name=wpb_s02_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s02_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

[event]
    name=die
    [filter]
        id=Vardoc
    [/filter]
    [set_variable]
        name=wpb_s02_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
            name=wpb_s02_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s02_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

    [event]
        name=turn 6
        [message]
            speaker=Vardoc
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=groan.wav
        [/sound]
        [unit]
            type=Soulless
            side=2
            x=33
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Soulless
            side=2
            x=34
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
