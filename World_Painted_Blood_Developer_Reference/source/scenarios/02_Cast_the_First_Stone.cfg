    [/sound]
    [message]
        speaker=unit
        message=_ "Ritual stone 2 is secured."
    [/message]
    [set_variable]
        name=wpb_s02_sites
        add=1
    [/set_variable]
    [terrain]
        x=20
        y=10
        terrain=Urb
    [/terrain]
    [label]
        x=20
        y=10
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s02_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s02_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

