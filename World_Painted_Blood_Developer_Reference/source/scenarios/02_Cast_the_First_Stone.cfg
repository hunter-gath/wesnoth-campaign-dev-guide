#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=02_Cast_the_First_Stone
    name=_ "Cast the First Stone"
    next_scenario=03_Here_Comes_the_Pain
    victory_when_enemies_defeated=no
    map_file=02_Cast_the_First_Stone.map
    {TURNS 30 27 24}
    {UNDERGROUND}
    {SCENARIO_MUSIC 02_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The passage opens into a terraced burial ground where surface prisoners are condemned before open graves. Vardoc calls each execution an act of penance and waits for the first act of resistance to awaken the dead beneath every stone."
        [/part]
        [part]
            story=_ "The Hunter must seize the ritual stones, release at least one prisoner, and overthrow Vardoc before the execution cycle is completed. By striking first, he announces to the entire underground that a living enemy is coming for its masters."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Peasant,Poacher,Footpad
        {GOLD 98 81 64}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Dark Sorcerer
        id=Vardoc
        name=_ "Vardoc the Penitent"
        canrecruit=yes
        x=36
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 90 112 134}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s02_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s02_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=13
            y=8
            text=_ "Ritual Stone 1"
        [/label]
        [label]
            x=20
            y=10
            text=_ "Ritual Stone 2"
        [/label]
        [label]
            x=26
            y=24
            text=_ "Ritual Stone 3"
        [/label]
        [label]
            x=8
            y=16
            text=_ "Brother Celn"
        [/label]
        [unit]
            type=Mage
            id=Brother_Celn
            name=_ "Brother Celn"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 ritual stone locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-10
            green=-45
            blue=-55
        [/color_adjust]
        [message]
            speaker=Vardoc
            message=_ "All who live are guilty of postponing death."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then I will postpone yours no longer."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Brother_Celn
            message=_ "The stones command the graves. Claim them before he gives the word."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Brother_Celn
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Brother_Celn
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Stand upon the nearest stone and call the wardens to you."
                    [/message]
                    [message]
                        speaker=Brother_Celn
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Vardoc
                        [/filter]
                        amount=8
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=20
                    [/gold]
                    [kill]
                        id=Brother_Celn
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=13
        y=8
    [/filter]
    [sound]
        name=groan.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Ritual stone 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s02_sites
        add=1
    [/set_variable]
    [terrain]
        x=13
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=13
        y=8
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s02_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s02_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

