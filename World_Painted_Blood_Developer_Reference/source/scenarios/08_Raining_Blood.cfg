#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=08_Raining_Blood
    name=_ "Raining Blood"
    next_scenario=09_Unguarded_Instinct
    victory_when_enemies_defeated=no
    map_file=08_Raining_Blood.map
    {TURNS 33 30 27}
    {UNDERGROUND}
    {SCENARIO_MUSIC 08_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "A crimson reservoir rains upon an unfinished fortress, carrying stolen life and obedience into the body of an ancient ruler. Souls hang above the channels like ornaments, stabilizing the resurrection."
        [/part]
        [part]
            story=_ "The Hunter must close the sluices, destroy the ritual pylons, and bring down Kharos and his drowned warden. When the system ruptures, the entire cavern begins to flood."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Poacher,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 122 99 76}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Lich
        id=Kharos
        name=_ "Kharos the Red-Crowned"
        canrecruit=yes
        x=32
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 120 148 176}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Revenant
        id=Uln
        name=_ "Uln the Drowned Warden"
        canrecruit=yes
        x=32
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 100 133 166}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s08_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s08_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=8
            text=_ "Sluice Control 1"
        [/label]
        [label]
            x=24
            y=8
            text=_ "Sluice Control 2"
        [/label]
        [label]
            x=12
            y=24
            text=_ "Sluice Control 3"
        [/label]
        [label]
            x=24
            y=24
            text=_ "Sluice Control 4"
        [/label]
        [label]
            x=8
            y=16
            text=_ "Meris Vell"
        [/label]
        [unit]
            type=Mage
            id=Meris_Vell
            name=_ "Meris Vell"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 sluice control locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=15
            green=-55
            blue=-50
        [/color_adjust]
        [message]
            speaker=Kharos
            message=_ "I remember every hand that buried me."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Remember mine."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Meris_Vell
            message=_ "Close all four controls and the pressure will tear the fortress apart."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Meris_Vell
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Meris_Vell
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Hold the nearest sluice open until we cross. You will not outrun the flood."
                    [/message]
                    [message]
                        speaker=Meris_Vell
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Kharos
                        [/filter]
                        amount=11
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=26
                    [/gold]
                    [kill]
                        id=Meris_Vell
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=8
    [/filter]
    [sound]
        name=cave-in.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Sluice control 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s08_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=8
        text=""
    [/label]
    [terrain]
        x=11,12,13
        y=8,8,8
        terrain=Sm
    [/terrain]
    [harm_unit]
        [filter]
            side=2,3
            [filter_location]
                x=12
                y=8
                radius=2
            [/filter_location]
        [/filter]
        amount=6
        damage_type=cold
        animate=yes
    [/harm_unit]
    [if]
        [variable]
            name=wpb_s08_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s08_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

