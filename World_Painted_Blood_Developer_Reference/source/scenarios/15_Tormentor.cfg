    [event]
        name=turn 7
        [message]
            speaker=Tormentor
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=fire.wav
        [/sound]
        [unit]
            type=Shadow
            side=2
            x=35
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Shadow
            side=2
            x=36
