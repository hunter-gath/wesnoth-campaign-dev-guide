#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=15_Tormentor
    name=_ "Tormentor"
    next_scenario=16_War_Ensemble
    victory_when_enemies_defeated=no
    map_file=15_Tormentor.map
    {TURNS 31 28 25}
    {UNDERGROUND}
    {SCENARIO_MUSIC 15_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "An abandoned underground city appears empty, yet shadows stop whenever they are watched and familiar voices call from unopened doors. The Tormentor feeds upon the moment before violence rather than the killing itself."
        [/part]
        [part]
            story=_ "The Hunter must light the ward braziers, preserve at least one witness if possible, and force the unseen predator into a place where it can be killed. Civilians can guard the lights—or become lures in the dark."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Nightgaunt
        id=Tormentor
        name=_ "The Tormentor"
        canrecruit=yes
        x=38
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 155 190 225}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s15_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s15_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=14
            y=7
            text=_ "Ward Brazier 1"
        [/label]
        [label]
            x=28
            y=7
            text=_ "Ward Brazier 2"
        [/label]
        [label]
            x=14
            y=21
            text=_ "Ward Brazier 3"
        [/label]
        [label]
            x=28
            y=21
            text=_ "Ward Brazier 4"
        [/label]
        [label]
            x=8
            y=14
            text=_ "Elra Noll"
        [/label]
        [unit]
            type=Footpad
            id=Elra_Noll
            name=_ "Elra Noll"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 ward brazier locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-45
            green=-35
            blue=-20
        [/color_adjust]
        [message]
            speaker=Tormentor
            message=_ "One of them will call your name when you leave them."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Come closer and say it yourself."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Elra_Noll
            message=_ "Light the braziers. In full light it has nowhere left to be."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Elra_Noll
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Elra_Noll
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Carry an unlit lantern into the northern streets and keep calling for help."
                    [/message]
                    [message]
                        speaker=Elra_Noll
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Tormentor
                        [/filter]
                        amount=14
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=33
                    [/gold]
                    [kill]
                        id=Elra_Noll
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=14
        y=7
    [/filter]
    [sound]
        name=fire.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Ward brazier 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s15_sites
        add=1
    [/set_variable]
    [terrain]
        x=14
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=14
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s15_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s15_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

