    name=die
    [filter]
        id=Othmar
    [/filter]
    [set_variable]
        name=wpb_s12_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
