    [event]
        name=turn 4
        [message]
            speaker=Othmar
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=heal.wav
        [/sound]
        [unit]
            type=Wraith
            side=2
            x=29
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Wraith
            side=2
            x=30
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
