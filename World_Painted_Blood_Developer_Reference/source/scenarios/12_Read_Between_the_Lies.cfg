#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=12_Read_Between_the_Lies
    name=_ "Read Between the Lies"
    next_scenario=13_Aggressive_Perfector
    victory_when_enemies_defeated=no
    map_file=12_Read_Between_the_Lies.map
    {TURNS 32 29 26}
    {UNDERGROUND}
    {SCENARIO_MUSIC 12_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The frightened city turns toward a temple promising salvation and a road to the surface. Prelate Othmar converts donations into obedience and prayers into contracts claimed by the lich beneath his altar."
        [/part]
        [part]
            story=_ "The Hunter must expose the fraud, break the soul reliquaries, and defeat Othmar and the Benefactor before the final ceremony binds the congregation forever."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Mage of Light
        id=Othmar
        name=_ "Prelate Othmar"
        canrecruit=yes
        x=32
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 140 172 204}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Lich
        id=Benefactor
        name=_ "The Benefactor"
        canrecruit=yes
        x=32
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 120 157 194}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s12_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s12_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=7
            text=_ "Soul Reliquary 1"
        [/label]
        [label]
            x=18
            y=9
            text=_ "Soul Reliquary 2"
        [/label]
        [label]
            x=24
            y=21
            text=_ "Soul Reliquary 3"
        [/label]
        [label]
            x=8
            y=14
            text=_ "Maelis"
        [/label]
        [unit]
            type=Mage
            id=Maelis
            name=_ "Maelis"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 soul reliquary locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=5
            green=-35
            blue=-45
        [/color_adjust]
        [message]
            speaker=Othmar
            message=_ "They gave because they believed."
        [/message]
        [message]
            speaker=Hunter
            message=_ "They believed because you lied."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Maelis
            message=_ "The reliquaries beneath the altar hold every oath he has stolen."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Maelis
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Maelis
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Continue the ceremony and keep the congregation facing you while I enter the crypt."
                    [/message]
                    [message]
                        speaker=Maelis
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Othmar
                        [/filter]
                        amount=13
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=30
                    [/gold]
                    [kill]
                        id=Maelis
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=7
    [/filter]
    [sound]
        name=heal.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Soul reliquary 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s12_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s12_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s12_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

