#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=16_War_Ensemble
    name=_ "War Ensemble"
    next_scenario=17_Repentless
    victory_when_enemies_defeated=no
    map_file=16_War_Ensemble.map
    {TURNS 40 36 32}
    {UNDERGROUND}
    {SCENARIO_MUSIC 16_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "At the great crossroads the conflict becomes open war. Undead columns march toward three surface shafts while freed miners, citizens, spirits, and former prisoners gather according to the choices made along the descent."
        [/part]
        [part]
            story=_ "The Hunter must destroy the invasion gates and kill Bone Marshal Rhadek and Banebow Keth before a commander reaches the surface. Engineers can dismantle each gate safely—or carry charges on a one-way mission."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=18
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Outlaw,Swordsman,Longbowman,White Mage,Dwarvish Fighter
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Death Knight
        id=Rhadek
        name=_ "Bone Marshal Rhadek"
        canrecruit=yes
        x=44
        y=18
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 160 196 232}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Banebow
        id=Keth
        name=_ "Banebow Keth"
        canrecruit=yes
        x=44
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 140 181 222}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s16_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s16_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=16
            y=9
            text=_ "Invasion Gate 1"
        [/label]
        [label]
            x=24
            y=12
            text=_ "Invasion Gate 2"
        [/label]
        [label]
            x=32
            y=27
            text=_ "Invasion Gate 3"
        [/label]
        [label]
            x=8
            y=18
            text=_ "Nara Feld"
        [/label]
        [unit]
            type=Dwarvish Thunderer
            id=Nara_Feld
            name=_ "Nara Feld"
            side=4
            x=8
            y=18
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 invasion gate locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=15
            green=-45
            blue=-60
        [/color_adjust]
        [message]
            speaker=Rhadek
            message=_ "Count your living. I have counted my dead."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Count again when this is over."
        [/message]
        [gold]
            side=1
            amount=$($wpb_alliance_strength * 8)
        [/gold]
        [message]
            speaker=narrator
            message= _ "Those deliberately saved during the descent have gathered what strength they can. Alliance reserve: $wpb_alliance_strength."
        [/message]
    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=18
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Nara_Feld
            message=_ "I can dismantle the gates, but each one needs time under fire."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Nara_Feld
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Nara_Feld
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Take the charges through the center gate. There will be no road back."
                    [/message]
                    [message]
                        speaker=Nara_Feld
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Rhadek
                        [/filter]
                        amount=15
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=34
                    [/gold]
                    [kill]
                        id=Nara_Feld
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=16
        y=9
    [/filter]
    [sound]
        name=explosion.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Invasion gate 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s16_sites
        add=1
    [/set_variable]
    [terrain]
        x=16
        y=9
        terrain=Urb
    [/terrain]
    [label]
        x=16
        y=9
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s16_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s16_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

