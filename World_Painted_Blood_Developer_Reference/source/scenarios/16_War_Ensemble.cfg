    [event]
        name=turn 4
        [message]
            speaker=Rhadek
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=explosion.ogg
        [/sound]
        [unit]
            type=Draug
            side=2
            x=41
            y=15
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Draug
            side=2
            x=42
            y=15
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
