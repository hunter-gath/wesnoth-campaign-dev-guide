#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=01_When_the_Stillness_Comes
    name=_ "When the Stillness Comes"
    next_scenario=02_Cast_the_First_Stone
    victory_when_enemies_defeated=no
    map_file=01_When_the_Stillness_Comes.map
    {TURNS 28 25 22}
    {UNDERGROUND}
    {SCENARIO_MUSIC 01_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The Hunter awakens at the bottom of the sinkhole in a corpse chamber where even dripping water seems afraid to make a sound. Bodies cover the floor, his equipment is scattered among them, and a silent executioner moves whenever the living are isolated."
        [/part]
        [part]
            story=_ "To escape, the Hunter must recover his weapons, free another survivor, and destroy Collector Oth, the necromancer who prepares surface victims for transport deeper underground. The records left behind reveal that the massacre is only the first station in an organized supply line."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Peasant,Poacher,Footpad
        {GOLD 94 78 62}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Necromancer
        id=Collector_Oth
        name=_ "Collector Oth"
        canrecruit=yes
        x=34
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 85 106 127}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s01_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s01_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=10
            text=_ "Equipment Cache 1"
        [/label]
        [label]
            x=25
            y=20
            text=_ "Equipment Cache 2"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Eda Varr"
        [/label]
        [unit]
            type=Poacher
            id=Eda_Varr
            name=_ "Eda Varr"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 2 equipment cache locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-35
            green=-55
            blue=-20
        [/color_adjust]
        [message]
            speaker=Collector_Oth
            message=_ "Most arrive here already dead. You have made unnecessary work for me."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then let us finish the work together."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Eda_Varr
            message=_ "Lower your voice. Something here listens for the living."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Eda_Varr
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Eda_Varr
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Make noise in the eastern passage. Draw it away from me."
                    [/message]
                    [message]
                        speaker=Eda_Varr
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Collector_Oth
                        [/filter]
                        amount=7
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=19
                    [/gold]
                    [kill]
                        id=Eda_Varr
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=10
    [/filter]
    [sound]
        name=dagger-swish.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Equipment cache 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s01_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=10
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=10
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s01_sites
            numerical_equals=2
        [/variable]
        [and]
            [variable]
                name=wpb_s01_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=25
        y=20
    [/filter]
    [sound]
        name=dagger-swish.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Equipment cache 2 is secured."
    [/message]
    [set_variable]
        name=wpb_s01_sites
        add=1
    [/set_variable]
    [terrain]
        x=25
        y=20
        terrain=Urb
    [/terrain]
    [label]
        x=25
        y=20
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s01_sites
            numerical_equals=2
        [/variable]
        [and]
            [variable]
                name=wpb_s01_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

[event]
    name=die
    [filter]
        id=Collector_Oth
    [/filter]
    [set_variable]
        name=wpb_s01_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
            name=wpb_s01_sites
            numerical_equals=2
        [/variable]
        [and]
            [variable]
                name=wpb_s01_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

    [event]
        name=turn 5
        [message]
            speaker=Collector_Oth
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=dagger-swish.wav
        [/sound]
        [unit]
            type=Nightgaunt
            side=2
            x=31
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Nightgaunt
            side=2
            x=32
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
