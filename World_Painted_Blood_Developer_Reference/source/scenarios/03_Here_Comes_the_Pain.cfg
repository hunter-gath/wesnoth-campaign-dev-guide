#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=03_Here_Comes_the_Pain
    name=_ "Here Comes the Pain"
    next_scenario=04_Show_No_Mercy
    victory_when_enemies_defeated=no
    map_file=03_Here_Comes_the_Pain.map
    {TURNS 32 29 26}
    {UNDERGROUND}
    {SCENARIO_MUSIC 03_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "A fortress gate is protected by an arena where intruders are broken before an audience of silent dead. Its champion, Gorath, has piled the weapons of every challenger beneath his throne."
        [/part]
        [part]
            story=_ "The Hunter must seize the arena controls and survive successive waves before confronting Gorath and the necromancer Nethys. Winning opens the gate and turns the lost surface-dweller into a threat recognized by the underground command."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Peasant,Poacher,Footpad,Spearman,Bowman
        {GOLD 102 84 66}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Draug
        id=Gorath
        name=_ "Gorath the Agony"
        canrecruit=yes
        x=38
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 95 118 141}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Necromancer
        id=Nethys
        name=_ "Nethys, Master of Trials"
        canrecruit=yes
        x=38
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 75 103 131}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s03_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s03_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=14
            y=7
            text=_ "Arena Control 1"
        [/label]
        [label]
            x=21
            y=9
            text=_ "Arena Control 2"
        [/label]
        [label]
            x=28
            y=21
            text=_ "Arena Control 3"
        [/label]
        [label]
            x=8
            y=14
            text=_ "Torren Hale"
        [/label]
        [unit]
            type=Swordsman
            id=Torren_Hale
            name=_ "Torren Hale"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 arena control locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=5
            green=-45
            blue=-65
        [/color_adjust]
        [message]
            speaker=Gorath
            message=_ "Small thing. Loud heart."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Come closer and quiet it."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Torren_Hale
            message=_ "The controls open the gates between rounds. Take them before the champion enters."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Torren_Hale
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Torren_Hale
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Enter the ring first. I will use the moment to seize the western control."
                    [/message]
                    [message]
                        speaker=Torren_Hale
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Gorath
                        [/filter]
                        amount=8
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=21
                    [/gold]
                    [kill]
                        id=Torren_Hale
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=14
        y=7
    [/filter]
    [sound]
        name=fanfare-short.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Arena control 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s03_sites
        add=1
    [/set_variable]
    [terrain]
        x=14
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=14
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s03_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s03_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

