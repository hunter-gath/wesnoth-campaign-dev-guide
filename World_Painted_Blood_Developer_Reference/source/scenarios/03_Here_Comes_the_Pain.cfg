    [event]
        name=turn 7
        [message]
            speaker=Gorath
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=fanfare-short.wav
        [/sound]
        [unit]
            type=Deathblade
            side=2
            x=35
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Deathblade
            side=2
