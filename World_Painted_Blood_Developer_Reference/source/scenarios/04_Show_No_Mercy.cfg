#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=04_Show_No_Mercy
    name=_ "Show No Mercy"
    next_scenario=05_At_Dawn_They_Sleep
    victory_when_enemies_defeated=no
    map_file=04_Show_No_Mercy.map
    {TURNS 28 25 22}
    {UNDERGROUND}
    {SCENARIO_MUSIC 04_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "Past the arena lies a maze built for pursuit. Bells alter its gates, undead patrols enter from sealed passages, and Veil-Mistress Ysara hunts escaped captives for sport."
        [/part]
        [part]
            story=_ "The Hunter must silence the hunt bells and force open the southern route while patrols close behind him. Mercy is optional; escape is not."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Peasant,Poacher,Footpad,Spearman,Bowman
        {GOLD 106 87 68}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Dark Sorcerer
        id=Ysara
        name=_ "Veil-Mistress Ysara"
        canrecruit=yes
        x=32
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer,Ghoul,Dark Adept
        {GOLD 100 124 148}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s04_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s04_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=7
            text=_ "Hunt Bell 1"
        [/label]
        [label]
            x=18
            y=10
            text=_ "Hunt Bell 2"
        [/label]
        [label]
            x=24
            y=22
            text=_ "Hunt Bell 3"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Noma Reed"
        [/label]
        [unit]
            type=Footpad
            id=Noma_Reed
            name=_ "Noma Reed"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 hunt bell locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-45
            green=-25
            blue=-20
        [/color_adjust]
        [message]
            speaker=Ysara
            message=_ "I have hunted brave men before. They scream no differently."
        [/message]
        [message]
            speaker=Hunter
            message=_ "You have never hunted one who came looking for you."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Noma_Reed
            message=_ "The bells change the gates. Silence them and the maze stops serving her."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Noma_Reed
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Noma_Reed
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Run the wrong corridor and make her patrols follow."
                    [/message]
                    [message]
                        speaker=Noma_Reed
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Ysara
                        [/filter]
                        amount=9
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=22
                    [/gold]
                    [kill]
                        id=Noma_Reed
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=7
    [/filter]
    [sound]
        name=bat-flapping.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Hunt bell 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s04_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s04_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s04_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=18
        y=10
    [/filter]
    [sound]
        name=bat-flapping.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Hunt bell 2 is secured."
    [/message]
    [set_variable]
        name=wpb_s04_sites
        add=1
    [/set_variable]
    [terrain]
        x=18
        y=10
        terrain=Urb
    [/terrain]
    [label]
        x=18
        y=10
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s04_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s04_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

