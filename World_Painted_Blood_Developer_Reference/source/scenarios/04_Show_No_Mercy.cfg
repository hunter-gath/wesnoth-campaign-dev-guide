    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=24
        y=22
    [/filter]
    [sound]
        name=bat-flapping.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Hunt bell 3 is secured."
    [/message]
    [set_variable]
        name=wpb_s04_sites
        add=1
    [/set_variable]
    [terrain]
        x=24
        y=22
        terrain=Urb
    [/terrain]
    [label]
        x=24
        y=22
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s04_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s04_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

[event]
    name=die
    [filter]
        id=Ysara
    [/filter]
    [set_variable]
        name=wpb_s04_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
            name=wpb_s04_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s04_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

    [event]
        name=turn 4
        [message]
            speaker=Ysara
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=bat-flapping.wav
        [/sound]
        [unit]
            type=Nightgaunt
            side=2
            x=28
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Nightgaunt
            side=2
            x=30
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
