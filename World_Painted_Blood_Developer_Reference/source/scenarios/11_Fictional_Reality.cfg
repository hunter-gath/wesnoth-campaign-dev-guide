#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=11_Fictional_Reality
    name=_ "Fictional Reality"
    next_scenario=12_Read_Between_the_Lies
    victory_when_enemies_defeated=no
    map_file=11_Fictional_Reality.map
    {TURNS 36 33 30}
    {UNDERGROUND}
    {SCENARIO_MUSIC 11_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The next cavern contains a human city beneath a bright false sky. Its people believe the surface has fallen and that Provost Caldrin alone protects them from staged undead attacks."
        [/part]
        [part]
            story=_ "The Hunter must gather evidence, reveal the corpse warehouses, and overthrow Caldrin and his necromantic partner Morrowmask. Destroying the illusion forces the population to confront the cavern walls around them."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Arch Mage
        id=Caldrin
        name=_ "Provost Caldrin"
        canrecruit=yes
        x=38
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 135 166 197}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Necromancer
        id=Morrowmask
        name=_ "Morrowmask"
        canrecruit=yes
        x=38
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 115 151 187}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s11_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s11_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=14
            y=8
            text=_ "Evidence Cache 1"
        [/label]
        [label]
            x=28
            y=8
            text=_ "Evidence Cache 2"
        [/label]
        [label]
            x=14
            y=24
            text=_ "Evidence Cache 3"
        [/label]
        [label]
            x=28
            y=24
            text=_ "Evidence Cache 4"
        [/label]
        [label]
            x=8
            y=16
            text=_ "Veyla Sorn"
        [/label]
        [unit]
            type=Fencer
            id=Veyla_Sorn
            name=_ "Veyla Sorn"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 evidence cache locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-5
            green=-20
            blue=-45
        [/color_adjust]
        [message]
            speaker=Caldrin
            message=_ "The truth would destroy them."
        [/message]
        [message]
            speaker=Hunter
            message=_ "The lie is already doing that."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Veyla_Sorn
            message=_ "Find the hidden records. The guards may believe documents before they believe us."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Veyla_Sorn
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Veyla_Sorn
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Expose yourself in the square and draw the staged raid while I search the archive."
                    [/message]
                    [message]
                        speaker=Veyla_Sorn
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Caldrin
                        [/filter]
                        amount=12
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=29
                    [/gold]
                    [kill]
                        id=Veyla_Sorn
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=14
        y=8
    [/filter]
    [sound]
        name=gold.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Evidence cache 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s11_sites
        add=1
    [/set_variable]
    [terrain]
        x=14
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=14
        y=8
        text=""
    [/label]
    [set_variable]
        name=wpb_truth
        add=1
    [/set_variable]
    [if]
        [variable]
            name=wpb_s11_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s11_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

