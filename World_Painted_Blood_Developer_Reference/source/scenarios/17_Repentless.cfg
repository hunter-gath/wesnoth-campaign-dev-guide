#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=17_Repentless
    name=_ "Repentless"
    next_scenario=18_Eyes_of_the_Insane
    victory_when_enemies_defeated=no
    map_file=17_Repentless.map
    {TURNS 36 33 30}
    {UNDERGROUND}
    {SCENARIO_MUSIC 17_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The cabal's outer fortress is defended by living soldiers who remain awake inside magical compulsion. The Hunter must continue forward without confusing relentless purpose with indiscriminate cruelty."
        [/part]
        [part]
            story=_ "Three ward rings protect Magister Vorn and Saedra. Each can be opened by a key, a control circle, or a living sacrifice, allowing the player's established moral method to become a direct tactical choice."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Outlaw,Swordsman,Longbowman,White Mage,Dwarvish Fighter
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Arch Mage
        id=Vorn
        name=_ "Magister Vorn"
        canrecruit=yes
        x=34
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 165 202 239}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Necromancer
        id=Saedra
        name=_ "Magister Saedra"
        canrecruit=yes
        x=34
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 145 187 229}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s17_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s17_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=8
            text=_ "Fortress Ward 1"
        [/label]
        [label]
            x=19
            y=10
            text=_ "Fortress Ward 2"
        [/label]
        [label]
            x=25
            y=24
            text=_ "Fortress Ward 3"
        [/label]
        [label]
            x=8
            y=16
            text=_ "General Jalen Rusk"
        [/label]
        [unit]
            type=General
            id=Jalen_Rusk
            name=_ "General Jalen Rusk"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 fortress ward locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-5
            green=-40
            blue=-35
        [/color_adjust]
        [message]
            speaker=Vorn
            message=_ "You demand an end to cruelty while standing upon the bodies that brought you here."
        [/message]
        [message]
            speaker=Hunter
            message=_ "I demand nothing. I am here to end you."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Jalen_Rusk
            message=_ "Destroy the ward controls and the commands inside our minds will weaken."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Jalen_Rusk
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Jalen_Rusk
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Remain bound and order the garrison to attack you instead of us."
                    [/message]
                    [message]
                        speaker=Jalen_Rusk
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Vorn
                        [/filter]
                        amount=15
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=35
                    [/gold]
                    [kill]
                        id=Jalen_Rusk
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=8
    [/filter]
    [sound]
        name=fuse.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Fortress ward 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s17_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=8
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s17_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s17_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

