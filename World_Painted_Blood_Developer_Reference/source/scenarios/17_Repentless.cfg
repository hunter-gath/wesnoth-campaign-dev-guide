    [event]
        name=turn 5
        [message]
            speaker=Vorn
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=fuse.ogg
        [/sound]
        [unit]
            type=Revenant
            side=2
            x=31
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Revenant
            side=2
            x=32
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
