                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

    [event]
        name=turn 7
        [message]
            speaker=Istrava
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=heal.wav
        [/sound]
        [unit]
            type=Ranger
            side=2
            x=35
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Ranger
            side=2
            x=36
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
    [/event]





    {WPB_HUNTER_DEATH}
    {WPB_TIME_OVER}
[/scenario]
