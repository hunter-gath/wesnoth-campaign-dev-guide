#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=07_You_Against_You
    name=_ "You Against You"
    next_scenario=08_Raining_Blood
    victory_when_enemies_defeated=no
    map_file=07_You_Against_You.map
    {TURNS 30 27 24}
    {UNDERGROUND}
    {SCENARIO_MUSIC 07_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "Perfectly symmetrical halls turn suspicion into memory and reflections into enemies. Every companion sees proof that the others have betrayed them, while a false Hunter repeats the accusations the real one refuses to hear."
        [/part]
        [part]
            story=_ "The party must shatter the mirror anchors and identify Istrava's true body. Violence against the wrong reflections makes the battle harder, while trust opens the direct path."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Poacher,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 118 96 74}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Silver Mage
        id=Istrava
        name=_ "Istrava of the Second Face"
        canrecruit=yes
        x=38
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Walking Corpse,Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade
        {GOLD 115 142 169}
        income=3
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s07_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s07_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=14
            y=7
            text=_ "Mirror Anchor 1"
        [/label]
        [label]
            x=21
            y=10
            text=_ "Mirror Anchor 2"
        [/label]
        [label]
            x=28
            y=22
            text=_ "Mirror Anchor 3"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Selka Morn"
        [/label]
        [unit]
            type=Outlaw
            id=Selka_Morn
            name=_ "Selka Morn"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 mirror anchor locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-25
            green=-25
            blue=-5
        [/color_adjust]
        [message]
            speaker=Istrava
            message=_ "I removed nothing. I only showed them what you hide."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then the mirrors have seen enough."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Selka_Morn
            message=_ "The anchors make the lies agree with one another. Break them."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Selka_Morn
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Selka_Morn
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Enter the mirrored chamber and give the reflections someone else to copy."
                    [/message]
                    [message]
                        speaker=Selka_Morn
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Istrava
                        [/filter]
                        amount=10
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=25
                    [/gold]
                    [kill]
                        id=Selka_Morn
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=14
        y=7
    [/filter]
    [sound]
        name=heal.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Mirror anchor 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s07_sites
        add=1
    [/set_variable]
    [terrain]
        x=14
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=14
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s07_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s07_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

