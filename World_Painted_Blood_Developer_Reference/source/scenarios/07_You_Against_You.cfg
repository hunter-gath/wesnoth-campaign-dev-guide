[event]
    name=die
    [filter]
        id=Istrava
    [/filter]
    [set_variable]
        name=wpb_s07_bosses
        add=1
    [/set_variable]
    [message]
        speaker=Hunter
        message=_ "One command voice is silent."
    [/message]
    [if]
        [variable]
            name=wpb_s07_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s07_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
