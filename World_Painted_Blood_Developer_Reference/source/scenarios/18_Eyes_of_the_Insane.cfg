#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=18_Eyes_of_the_Insane
    name=_ "Eyes of the Insane"
    next_scenario=19_Spirit_in_Black
    victory_when_enemies_defeated=no
    map_file=18_Eyes_of_the_Insane.map
    {TURNS 34 31 28}
    {UNDERGROUND}
    {SCENARIO_MUSIC 18_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "A memory chamber assembles fragments of every previous battlefield into an impossible whole. The dead return with accusations shaped from the campaign's actual sacrifices and failures."
        [/part]
        [part]
            story=_ "The Hunter must destroy the memory lenses, distinguish the true Nyxara from her false images, and survive the final assault on his identity. The chamber cannot erase what happened; it can only decide who controls the meaning."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=14
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Outlaw,Swordsman,Longbowman,White Mage,Dwarvish Fighter
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=yes
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Dark Sorcerer
        id=Nyxara
        name=_ "Seer Nyxara"
        canrecruit=yes
        x=36
        y=14
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 170 208 246}
        income=5
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s18_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s18_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=13
            y=7
            text=_ "Memory Lens 1"
        [/label]
        [label]
            x=26
            y=7
            text=_ "Memory Lens 2"
        [/label]
        [label]
            x=13
            y=21
            text=_ "Memory Lens 3"
        [/label]
        [label]
            x=26
            y=21
            text=_ "Memory Lens 4"
        [/label]
        [label]
            x=8
            y=14
            text=_ "The Witness"
        [/label]
        [unit]
            type=Ghost
            id=The_Witness
            name=_ "The Witness"
            side=4
            x=8
            y=14
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 memory lens locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-20
            green=-20
            blue=-20
        [/color_adjust]
        [message]
            speaker=Nyxara
            message=_ "You call them necessary deaths because the dead cannot answer."
        [/message]
        [message]
            speaker=Hunter
            message=_ "You are not them."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=14
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=The_Witness
            message=_ "I am only the part of them that watched you keep walking."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=The_Witness
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=The_Witness
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Bind yourself to the nearest lens and draw the echoes into one memory."
                    [/message]
                    [message]
                        speaker=The_Witness
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Nyxara
                        [/filter]
                        amount=16
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=36
                    [/gold]
                    [kill]
                        id=The_Witness
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=13
        y=7
    [/filter]
    [sound]
        name=human-die-1.ogg
    [/sound]
    [message]
        speaker=unit
        message=_ "Memory lens 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s18_sites
        add=1
    [/set_variable]
    [terrain]
        x=13
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=13
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s18_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s18_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

