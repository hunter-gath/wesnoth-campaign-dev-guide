    [event]
        name=turn 6
        [message]
            speaker=Nyxara
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=human-die-1.ogg
        [/sound]
        [unit]
            type=Spectre
            side=2
            x=33
            y=11
            generate_name=yes
            random_traits=yes
        [/unit]
