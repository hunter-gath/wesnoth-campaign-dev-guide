    [event]
        name=turn 6
        [message]
            speaker=Vaulk
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=groan.wav
        [/sound]
        [unit]
            type=Ghost
            side=2
            x=33
            y=13
            generate_name=yes
            random_traits=yes
        [/unit]
        [unit]
            type=Ghost
            side=2
