#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=14_Ghosts_of_War
    name=_ "Ghosts of War"
    next_scenario=15_Tormentor
    victory_when_enemies_defeated=no
    map_file=14_Ghosts_of_War.map
    {TURNS 36 33 30}
    {UNDERGROUND}
    {SCENARIO_MUSIC 14_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "The laboratory collapses into an ancient battlefield where spectral armies repeat a war whose kingdoms vanished centuries ago. The cabal has chained their memories to three command standards."
        [/part]
        [part]
            story=_ "The Hunter must break or purify the standards and defeat Marshal Vaulk and Iskar. Spirits released through mercy return as allies; spirits dominated through corruption obey for different reasons."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=16
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Death Knight
        id=Vaulk
        name=_ "Marshal Vaulk"
        canrecruit=yes
        x=36
        y=16
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 150 184 218}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=3
        controller=ai
        type=Spectre
        id=Iskar
        name=_ "Iskar the Banner-Wraith"
        canrecruit=yes
        x=36
        y=5
        team_name=undead
        user_team_name= _ "Underground Host"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 130 169 208}
        income=2
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s14_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s14_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=13
            y=8
            text=_ "Command Standard 1"
        [/label]
        [label]
            x=20
            y=10
            text=_ "Command Standard 2"
        [/label]
        [label]
            x=26
            y=24
            text=_ "Command Standard 3"
        [/label]
        [label]
            x=8
            y=16
            text=_ "Teren Oss"
        [/label]
        [unit]
            type=Mage
            id=Teren_Oss
            name=_ "Teren Oss"
            side=4
            x=8
            y=16
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 3 command standard locations and defeat 2 enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-20
            green=-35
            blue=-15
        [/color_adjust]
        [message]
            speaker=Vaulk
            message=_ "No war ends while one soldier remembers defeat."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then I will give you something else to remember."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=16
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Teren_Oss
            message=_ "The standards hold them inside the last hour of their lives."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Teren_Oss
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Teren_Oss
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Carry a false standard into the eastern line and make both armies follow it."
                    [/message]
                    [message]
                        speaker=Teren_Oss
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Vaulk
                        [/filter]
                        amount=14
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=32
                    [/gold]
                    [kill]
                        id=Teren_Oss
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=13
        y=8
    [/filter]
    [sound]
        name=groan.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Command standard 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s14_sites
        add=1
    [/set_variable]
    [terrain]
        x=13
        y=8
        terrain=Urb
    [/terrain]
    [label]
        x=13
        y=8
        text=""
    [/label]
    [set_variable]
        name=wpb_alliance_strength
        add=1
    [/set_variable]
    [if]
        [variable]
            name=wpb_s14_sites
            numerical_equals=3
        [/variable]
        [and]
            [variable]
                name=wpb_s14_bosses
                numerical_equals=2
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

