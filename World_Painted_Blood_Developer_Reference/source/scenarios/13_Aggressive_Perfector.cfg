#textdomain wesnoth-World_Painted_Blood

[scenario]
    id=13_Aggressive_Perfector
    name=_ "Aggressive Perfector"
    next_scenario=14_Ghosts_of_War
    victory_when_enemies_defeated=no
    map_file=13_Aggressive_Perfector.map
    {TURNS 34 31 28}
    {UNDERGROUND}
    {SCENARIO_MUSIC 13_Scenario.ogg}
    victory_music=victory.ogg
    defeat_music=defeat.ogg

    [story]
        [part]
            story=_ "A hidden laboratory attempts to combine the strongest traits of living and undead bodies. Its failed creations fill the cells, while a perfected copy of the Hunter waits in the central chamber."
        [/part]
        [part]
            story=_ "The Hunter must disable the vats, defeat the imitation built from his choices, and destroy Sileth's archive. Every vat can be opened carefully or shattered with whoever remains inside."
        [/part]
    [/story]

    [side]
        side=1
        controller=human
        type=WPB Hunter
        id=Hunter
        name= _ "The Hunter"
        canrecruit=yes
        unrenamable=yes
        x=4
        y=15
        team_name=humans
        user_team_name= _ "The Living"
        recruit=Trapper,Footpad,Spearman,Bowman,Mage,Thug
        {GOLD 130 105 80}
        income=2
        fog=yes
        shroud=no
        {FLAG_VARIANT loyalist}
    [/side]

    [side]
        side=2
        controller=ai
        type=Necromancer
        id=Sileth
        name=_ "Magus Sileth, the Perfector"
        canrecruit=yes
        x=34
        y=15
        team_name=undead
        user_team_name= _ "Undead"
        recruit=Soulless,Skeleton,Skeleton Archer,Ghoul,Dark Adept,Ghost,Revenant,Deathblade,Shadow,Wraith,Necrophage,Bone Shooter
        {GOLD 145 178 211}
        income=4
        {FLAG_VARIANT undead}
    [/side]

    [side]
        side=4
        controller=null
        no_leader=yes
        hidden=yes
        team_name=prisoners
        user_team_name= _ "Captives"
    [/side]

    [event]
        name=prestart
        {WPB_ENSURE_VARIABLES}
        [set_variable]
            name=wpb_s13_sites
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_s13_bosses
            value=0
        [/set_variable]
        [set_variable]
            name=wpb_final_escape
            value=no
        [/set_variable]
        [label]
            x=12
            y=7
            text=_ "Perfection Vat 1"
        [/label]
        [label]
            x=25
            y=7
            text=_ "Perfection Vat 2"
        [/label]
        [label]
            x=12
            y=22
            text=_ "Perfection Vat 3"
        [/label]
        [label]
            x=25
            y=22
            text=_ "Perfection Vat 4"
        [/label]
        [label]
            x=8
            y=15
            text=_ "Kessa Thorn"
        [/label]
        [unit]
            type=Fencer
            id=Kessa_Thorn
            name=_ "Kessa Thorn"
            side=4
            x=8
            y=15
            random_traits=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [objectives]
            side=1
            [objective]
                description=_ "Secure all 4 perfection vat locations and defeat 1 enemy leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of the Hunter"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            {WPB_RECRUIT_NOTE}
            {WPB_GOLD_CARRYOVER}
        [/objectives]
    [/event]

    [event]
        name=start
        [color_adjust]
            red=-30
            green=-10
            blue=-5
        [/color_adjust]
        [message]
            speaker=Sileth
            message=_ "I removed everything that made you weak."
        [/message]
        [message]
            speaker=Hunter
            message=_ "Then you removed everything that made it me."
        [/message]

    [/event]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            [filter_location]
                x=8
                y=15
                radius=1
            [/filter_location]
        [/filter]
        [message]
            speaker=Kessa_Thorn
            message=_ "Open my vat carefully. The others may not survive even that."
        [/message]
        [message]
            speaker=Hunter
            message= _ "What do I do with this life?"
            [option]
                label= _ "Free and arm them"
                [command]
                    [modify_unit]
                        [filter]
                            id=Kessa_Thorn
                        [/filter]
                        side=1
                        upkeep=loyal
                    [/modify_unit]
                    [set_variable]
                        name=wpb_rescued
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_conscripted
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_alliance_strength
                        add=1
                    [/set_variable]
                    [message]
                        speaker=Kessa_Thorn
                        message= _ "Then give me a weapon. I will choose where I stand."
                    [/message]
                [/command]
            [/option]
            [option]
                label= _ "Use them as bait"
                [command]
                    [message]
                        speaker=Hunter
                        message=_ "Break the restraints and let the rejected experiments chase me through the western wing."
                    [/message]
                    [message]
                        speaker=Kessa_Thorn
                        message= _ "You knew the answer before you came near me."
                    [/message]
                    [set_variable]
                        name=wpb_sacrificed
                        add=1
                    [/set_variable]
                    [set_variable]
                        name=wpb_corruption
                        add=1
                    [/set_variable]
                    [harm_unit]
                        [filter]
                            id=Sileth
                        [/filter]
                        amount=13
                        damage_type=impact
                        animate=yes
                        kill=no
                    [/harm_unit]
                    [gold]
                        side=1
                        amount=31
                    [/gold]
                    [kill]
                        id=Kessa_Thorn
                        animate=yes
                        fire_event=no
                    [/kill]
                [/command]
            [/option]
        [/message]
    [/event]

[event]
    name=moveto
    first_time_only=yes
    [filter]
        side=1
        x=12
        y=7
    [/filter]
    [sound]
        name=hiss.wav
    [/sound]
    [message]
        speaker=unit
        message=_ "Perfection vat 1 is secured."
    [/message]
    [set_variable]
        name=wpb_s13_sites
        add=1
    [/set_variable]
    [terrain]
        x=12
        y=7
        terrain=Urb
    [/terrain]
    [label]
        x=12
        y=7
        text=""
    [/label]

    [if]
        [variable]
            name=wpb_s13_sites
            numerical_equals=4
        [/variable]
        [and]
            [variable]
                name=wpb_s13_bosses
                numerical_equals=1
            [/variable]
        [/and]
        [then]
            [message]
                speaker=Hunter
                message=_ "The road forward is open. Whatever waits below now knows I am coming."
            [/message]
            [endlevel]
                result=victory
                bonus=yes
                {NEW_GOLD_CARRYOVER 40}
            [/endlevel]
        [/then]
    [/if]
[/event]

