    [event]
        name=turn 5
        [message]
            speaker=Sileth
            message= _ "The deep host has heard us. Let it answer."
        [/message]
        [sound]
            name=hiss.wav
        [/sound]
        [unit]
            type=Ranger
            side=2
            x=31
            y=12
            generate_name=yes
            random_traits=yes
        [/unit]
