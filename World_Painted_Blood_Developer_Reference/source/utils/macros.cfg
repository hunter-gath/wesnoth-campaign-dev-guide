#textdomain wesnoth-World_Painted_Blood

#define WPB_ENSURE_VARIABLES
    [if]
        [variable]
            name=wpb_initialized
            not_equals=yes
        [/variable]
        [then]
            [set_variable]
                name=wpb_initialized
                value=yes
            [/set_variable]
            [set_variable]
                name=wpb_rescued
                value=0
            [/set_variable]
            [set_variable]
                name=wpb_conscripted
                value=0
            [/set_variable]
            [set_variable]
                name=wpb_sacrificed
                value=0
            [/set_variable]
            [set_variable]
                name=wpb_corruption
                value=0
            [/set_variable]
            [set_variable]
                name=wpb_truth
                value=0
            [/set_variable]
            [set_variable]
                name=wpb_alliance_strength
                value=0
            [/set_variable]
        [/then]
    [/if]
#enddef

#define WPB_HUNTER_DEATH
    [event]
        name=last breath
        [filter]
            id=Hunter
        [/filter]
        [message]
            speaker=Hunter
            message= _ "So this is where the trail ends..."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]
#enddef

#define WPB_TIME_OVER
    [event]
        name=time over
        [message]
            speaker=Hunter
            message= _ "Too late. The darkness has closed the road."
        [/message]
    [/event]
#enddef

#define WPB_GOLD_CARRYOVER
    [gold_carryover]
        bonus=yes
        carryover_percentage=40
    [/gold_carryover]
#enddef

#define WPB_RECRUIT_NOTE
    [note]
        description= _ "Deliberate rescue and sacrifice choices persist through the campaign and alter later reinforcements, dialogue, and endings."
    [/note]
#enddef
